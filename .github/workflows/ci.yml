name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: build & verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # npm run build runs: verify (manifest + unit tests + security scan)
      # -> tsc --noEmit (type check) -> vite build (production bundle)
      - name: Build & verify
        run: npm run build
